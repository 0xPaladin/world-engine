<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Planet Generator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0e14;
  color: #b3b1ad;
  font-family: system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1rem;
}
h1 {
  color: #e6e1cf;
  font-weight: 300;
  font-size: 1.5rem;
  letter-spacing: 0.05em;
  margin-bottom: 1rem;
  text-align: center;
}
.app {
  display: flex;
  gap: 1.5rem;
  justify-content: center;
  align-items: flex-start;
  width: 100%;
  max-width: 1400px;
}
.canvas-wrap {
  flex: 1 1 auto;
  display: flex;
  justify-content: center;
  align-items: center;
  min-width: 0;
}
canvas#output {
  display: block;
  width: min(65vw, 65vh, 700px);
  height: min(65vw, 65vh, 700px);
  border-radius: 50%;
  box-shadow: 0 0 80px rgba(100,180,255,0.15), 0 0 160px rgba(100,180,255,0.08);
  cursor: grab;
  background: #05080c;
}
canvas#output:active { cursor: grabbing; }
.controls {
  display: flex;
  flex-direction: column;
  gap: 0.65rem;
  width: 300px;
  flex-shrink: 0;
}
.control-group {
  background: #131920;
  border-radius: 8px;
  padding: 0.65rem 0.9rem;
}
.control-group label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.82rem;
  margin-bottom: 0.2rem;
  color: #8a8a8a;
}
.control-group label span { color: #e6e1cf; font-variant-numeric: tabular-nums; }
input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px;
  background: #2a3340; border-radius: 2px; outline: none;
  margin: 0.2rem 0;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px;
  background: #6fa8dc; border-radius: 50%; cursor: pointer;
  transition: background 0.15s;
}
input[type="range"]::-webkit-slider-thumb:hover { background: #8fc8fc; }
input[type="number"] {
  background: #1c2633;
  border: 1px solid #2a3340;
  border-radius: 4px;
  color: #e6e1cf;
  font-size: 0.82rem;
  padding: 0.25rem 0.4rem;
  width: 90px;
  outline: none;
  font-variant-numeric: tabular-nums;
}
input[type="number"]:focus { border-color: #6fa8dc; }
.btn-row {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}
.btn {
  padding: 0.35rem 0.7rem;
  border: 1px solid #2a3340;
  border-radius: 6px;
  background: #131920;
  color: #b3b1ad;
  font-size: 0.78rem;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.btn:hover { background: #1c2633; border-color: #6fa8dc; }
.btn.active { background: #1c2633; border-color: #6fa8dc; color: #e6e1cf; }
.btn.primary { background: #2a5580; border-color: #3a70a0; color: #fff; }
.btn.primary:hover { background: #3a70a0; }
.btn.new-planet { width: 100%; padding: 0.55rem; font-size: 0.88rem; }
.check-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.15rem; }
.check-row input { accent-color: #6fa8dc; }
.footer { margin-top: 0.5rem; font-size: 0.75rem; color: #555; }

@media (max-width: 800px) {
  .app { flex-direction: column; align-items: center; }
  canvas#output { width: min(85vw, 85vw); height: min(85vw, 85vw); }
  .controls { width: 100%; max-width: 400px; }
}
</style>
</head>
<body>

<h1>Planet Generator</h1>

<div class="app">
  <div class="canvas-wrap">
    <canvas id="output" width="1024" height="1024"></canvas>
  </div>

  <div class="controls">
    <button class="btn primary new-planet" onclick="var s=window.getSeed()+1; window.setSeed(s); document.getElementById('seed-input').value=s; document.getElementById('val-seed').textContent=s; generateMesh(); setTimeout(window.applyPopulation,200)">&#x21bb; New Planet</button>

    <div class="control-group">
      <label>Seed <span id="val-seed">123</span></label>
      <input type="number" id="seed-input" value="123" min="0" max="999999" style="width:100%"
             oninput="window.setSeed(+this.value); document.getElementById('val-seed').textContent=this.value; generateMesh(); setTimeout(window.applyPopulation,200)">
    </div>

    <div class="control-group">
      <label>Draw Mode</label>
      <div class="btn-row">
        <button class="btn active" id="mode-quads" onclick="setDrawMode('quads'); document.getElementById('mode-quads').classList.add('active'); document.getElementById('mode-centroid').classList.remove('active')">Quads</button>
        <button class="btn" id="mode-centroid" onclick="setDrawMode('centroid'); document.getElementById('mode-centroid').classList.add('active'); document.getElementById('mode-quads').classList.remove('active')">Flat</button>
      </div>
    </div>

    <div class="control-group">
      <label>Regions <span id="val-N">10000</span></label>
      <input type="range" min="2" max="5" step="0.001" value="4"
             oninput="v=Math.pow(10, this.valueAsNumber)|0; document.getElementById('val-N').textContent=v; setN(v); setTimeout(window.applyPopulation,200)">
    </div>

    <div class="control-group">
      <label>Plates <span id="val-P">20</span></label>
      <input type="range" min="5" max="100" value="20"
             oninput="v=this.valueAsNumber; document.getElementById('val-P').textContent=v; setP(v)">
    </div>

    <div class="control-group">
      <label>Jitter <span id="val-jitter">0.50</span></label>
      <input type="range" min="0" max="1" step="0.001" value="0.5"
             oninput="v=+this.value; document.getElementById('val-jitter').textContent=v.toFixed(2); setJitter(v); setTimeout(window.applyPopulation,200)">
    </div>

    <div class="control-group">
      <label>Rotation <span id="val-rotation">-2.00</span></label>
      <input type="range" min="-5" max="5" step="0.001" value="-2"
             oninput="v=+this.value; document.getElementById('val-rotation').textContent=v.toFixed(2); setRotation(v)">
    </div>

    <div class="control-group">
      <label>Temperature <span id="val-temp">0.00</span></label>
      <input type="range" min="-1" max="1" step="0.01" value="0"
             oninput="v=+this.value; document.getElementById('val-temp').textContent=v.toFixed(2); setTempOffset(v)">
    </div>

    <div class="control-group">
      <label>Rainfall <span id="val-rain">0.00</span></label>
      <input type="range" min="-0.5" max="0.5" step="0.01" value="0"
             oninput="v=+this.value; document.getElementById('val-rain').textContent=v.toFixed(2); setRainOffset(v)">
    </div>

    <div class="control-group">
      <label>Water Level <span id="val-water">0.00</span></label>
      <input type="range" min="-0.5" max="0.5" step="0.01" value="0"
             oninput="v=+this.value; document.getElementById('val-water').textContent=v.toFixed(2); setWaterLevel(v)">
    </div>

    <div class="control-group">
      <div class="check-row">
        <input type="checkbox" id="chk-vectors" oninput="setDrawPlateVectors(this.checked)">
        <label for="chk-vectors">Plate vectors</label>
      </div>
      <div class="check-row">
        <input type="checkbox" id="chk-boundaries" oninput="setDrawPlateBoundaries(this.checked)">
        <label for="chk-boundaries">Plate boundaries</label>
      </div>
    </div>

    <div class="control-group" style="border-top:1px solid #2a3340; padding-top:0.65rem;">
      <label>Cultures <span id="val-cultures">8</span></label>
      <input type="range" min="2" max="40" step="1" value="8"
             oninput="v=this.valueAsNumber; document.getElementById('val-cultures').textContent=v; setNumCultures(v)">
      <button class="btn primary new-planet" onclick="applyPopulation()" style="margin-top:0.4rem; width:100%; padding:0.5rem; font-size:0.85rem;">&#x21bb; Apply Changes</button>
      <div class="check-row" style="margin-top:0.3rem;">
        <input type="checkbox" id="chk-culture-overlay" oninput="setCultureOverlay(this.checked)">
        <label for="chk-culture-overlay">Culture overlay</label>
      </div>
      <div class="check-row">
        <input type="checkbox" id="chk-state-borders" oninput="setStateBorders(this.checked)">
        <label for="chk-state-borders">State borders</label>
      </div>
    </div>

    <div class="control-group" id="info-panel" style="display:none; min-height:80px;">
      <label>Region Info</label>
      <div id="info-content" style="font-size:0.78rem; line-height:1.6; color:#b3b1ad;"></div>
    </div>

    <div class="footer">click on the planet for region info &middot; drag to rotate &middot; based on <a href="https://www.redblobgames.com/x/1843-planet-generation/" style="color:#6fa8dc">Red Blob Games</a></div>
  </div>
</div>

<script src="../build/_bundle.regl.js"></script>

<script>
(function() {
  var canvas = document.getElementById('output');
  var dragging = false, lastX = 0, lastY = 0;
  var rotX = -2, rotY = 0.2;
  var seedInput = document.getElementById('seed-input');
  var valSeed = document.getElementById('val-seed');

  var _origSetSeed = window.setSeed;
  window.setSeed = function(s) {
    _origSetSeed(s);
    seedInput.value = s;
    valSeed.textContent = s;
  };

  canvas.addEventListener('mousedown', function(e) {
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
  });
  window.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var dx = e.clientX - lastX;
    var dy = e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;
    rotX += dx / 200;
    rotY += dy / 200;
    setRotation(rotX);
    var slider = document.querySelector('input[type="range"][min="-5"]');
    if (slider) { slider.value = rotX; document.getElementById('val-rotation').textContent = rotX.toFixed(2); }
  });
  window.addEventListener('mouseup', function() { dragging = false; });

  canvas.addEventListener('touchstart', function(e) {
    var t = e.touches[0];
    dragging = true; lastX = t.clientX; lastY = t.clientY;
  }, {passive: true});
  canvas.addEventListener('touchmove', function(e) {
    if (!dragging || e.touches.length !== 1) return;
    var t = e.touches[0];
    var dx = t.clientX - lastX;
    var dy = t.clientY - lastY;
    lastX = t.clientX; lastY = t.clientY;
    rotX += dx / 200;
    rotY += dy / 200;
    setRotation(rotX);
    var slider = document.querySelector('input[type="range"][min="-5"]');
    if (slider) { slider.value = rotX; document.getElementById('val-rotation').textContent = rotX.toFixed(2); }
  }, {passive: true});
  canvas.addEventListener('touchend', function() { dragging = false; }, {passive: true});

  // Picking: click to show region info
  var infoPanel = document.getElementById('info-panel');
  var infoContent = document.getElementById('info-content');

  canvas.addEventListener('click', function(e) {
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    var ndcX = (x / rect.width) * 2 - 1;
    var ndcY = -((y / rect.height) * 2 - 1);

    var info = window.pickRegion(ndcX, ndcY);
    if (!info) { infoPanel.style.display = 'none'; return; }

    var pop = window._population;
    var cultName = '', stateName = '', burgName = '';
    if (pop && pop.cellCulture[info.region] >= 0) {
      var ci = pop.cellCulture[info.region];
      if (pop.cultures[ci]) cultName = pop.cultures[ci].name;
    }
    if (pop && pop.cellState[info.region] > 0) {
      var si = pop.cellState[info.region];
      if (pop.states[si]) stateName = pop.states[si].name;
    }
    if (pop && pop.cellBurg[info.region] >= 0) {
      var bi = pop.cellBurg[info.region];
      if (pop.burgs[bi]) burgName = pop.burgs[bi].name;
    }
    infoContent.innerHTML =
      '<b>Region</b> ' + info.region + '<br>' +
      '<b>Biome</b> ' + info.biome + '<br>' +
      '<b>Temperature</b> ' + info.temperature.toFixed(1) + ' °C<br>' +
      '<b>Elevation</b> ' + info.rawElevation.toFixed(3) + '<br>' +
      '<b>Moisture</b> ' + info.moisture.toFixed(3) + '<br>' +
      '<b>Plate</b> ' + info.plate + ' (' + info.plateType + ')' +
      (cultName ? '<br><b>Culture</b> ' + cultName : '') +
      (stateName ? '<br><b>State</b> ' + stateName : '') +
      (burgName ? '<br><b>Settlement</b> ' + burgName : '');
    infoPanel.style.display = 'block';
  });
})();
</script>
</body>
</html>
